<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ユーザー登録</title>
</head>
<body>
    <h1>ユーザー登録</h1>

    <!-- Serviceが投げたIllegalStateException（ユーザー名重複）のメッセージ -->
    <p th:if="${errorMessage}" th:text="${errorMessage}" style="color:red;"></p>

    <form th:action="@{/user/register}" th:object="${userForm}" method="post">
        <div>
            <label>ユーザー名</label><br>
            <input type="text" th:field="*{username}">
            <!-- @NotBlank/@Sizeのバリデーションエラーメッセージ -->
            <span th:if="${#fields.hasErrors('username')}"
                  th:errors="*{username}"
                  style="color:red;"></span>
        </div>
        <div>
            <label>パスワード</label><br>
            <input type="password" th:field="*{password}">
            <span th:if="${#fields.hasErrors('password')}"
                  th:errors="*{password}"
                  style="color:red;"></span>
        </div>
        <button type="submit">登録</button>
    </form>

    <a th:href="@{/login}">ログインはこちら</a>
</body>
</html>
